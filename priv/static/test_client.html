<!DOCTYPE html>
<html>
<head>
  <title>CollaboDoc Test Client</title>
  <script src="https://cdn.jsdelivr.net/npm/phoenix@1.7.0/priv/static/phoenix.min.js"></script>
  <style>
    body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #d4d4d4; }
    h2 { color: #569cd6; }
    input, button { padding: 8px; margin: 4px; border-radius: 4px; border: none; }
    button { background: #0e639c; color: white; cursor: pointer; }
    button:hover { background: #1177bb; }
    #doc-content {
      width: 100%;
      height: 100px;
      background: #252526;
      color: #d4d4d4;
      border: 1px solid #569cd6;
      padding: 10px;
      font-size: 18px;
      margin: 10px 0;
    }
    #log {
      background: #252526;
      border: 1px solid #333;
      padding: 10px;
      height: 200px;
      overflow-y: auto;
      font-size: 12px;
    }
    .info { color: #4ec9b0; }
    .error { color: #f44747; }
    .op { color: #dcdcaa; }
    .panel { display: inline-block; vertical-align: top; width: 48%; margin: 1%; }
    .panel h3 { color: #9cdcfe; }
  </style>
</head>
<body>

<h2>🚀 CollaboDoc — Live Test Client</h2>
<p>Open this file in <b>two browser tabs</b> to simulate two users editing simultaneously.</p>

<div>
  <label>Document ID: </label>
  <input id="doc-id" value="test-room-1" style="width:200px"/>
  <label>Your Name: </label>
  <input id="client-name" value="User1" style="width:100px"/>
  <button onclick="connect()">Connect</button>
  <span id="status" style="margin-left:10px; color: #f44747;">● Disconnected</span>
</div>

<br/>

<div>
  <b>Document Content:</b>
  <div id="doc-content">[ not connected ]</div>
  <b>Revision: </b><span id="revision">0</span>
</div>

<div class="panel">
  <h3>Insert Character</h3>
  <label>Position: </label>
  <input id="insert-pos" type="number" value="0" style="width:60px"/>
  <label>Char: </label>
  <input id="insert-char" maxlength="1" style="width:40px" value="A"/>
  <button onclick="sendInsert()">Insert</button>
</div>

<div class="panel">
  <h3>Delete Character</h3>
  <label>Position: </label>
  <input id="delete-pos" type="number" value="0" style="width:60px"/>
  <button onclick="sendDelete()">Delete</button>
</div>

<br/>
<b>Event Log:</b>
<div id="log"></div>

<script>
  let channel = null;
  let socket = null;
  let currentRevision = 0;

  function log(msg, type = "info") {
    const div = document.getElementById("log");
    const time = new Date().toLocaleTimeString();
    div.innerHTML += `<div class="${type}">[${time}] ${msg}</div>`;
    div.scrollTop = div.scrollHeight;
  }

  function connect() {
    const docId = document.getElementById("doc-id").value;
    const clientName = document.getElementById("client-name").value;

    if (socket) socket.disconnect();

    socket = new Phoenix.Socket("ws://localhost:4000/socket", {});
    socket.connect();

    channel = socket.channel(`doc:${docId}`, { client_id: clientName });

    channel.join()
      .receive("ok", (resp) => {
        log(`✅ Joined doc:${docId}`, "info");
        log(`📄 Current content: "${resp.content}" | Revision: ${resp.revision}`, "info");
        document.getElementById("doc-content").innerText = resp.content || "(empty)";
        document.getElementById("revision").innerText = resp.revision;
        document.getElementById("status").innerText = "● Connected";
        document.getElementById("status").style.color = "#4ec9b0";
        currentRevision = resp.revision;
      })
      .receive("error", (err) => {
        log(`❌ Failed to join: ${JSON.stringify(err)}`, "error");
      });

    channel.on("op", (payload) => {
      log(`📨 Received op from ${payload.client_id}: ${JSON.stringify(payload.op)} | Rev: ${payload.revision}`, "op");
      currentRevision = payload.revision;
      document.getElementById("revision").innerText = currentRevision;
      // Refresh content by rejoining would be complex — show a note instead
      log(`💡 Tip: Click Connect again to see latest content`, "info");
    });
  }

  function sendInsert() {
    if (!channel) { log("❌ Not connected!", "error"); return; }
    const pos = parseInt(document.getElementById("insert-pos").value);
    const char = document.getElementById("insert-char").value;

    channel.push("op", {
      revision: currentRevision,
      op: { type: "insert", pos: pos, char: char }
    })
    .receive("ok", (resp) => {
      log(`✅ Insert "${char}" at ${pos} → Rev: ${resp.revision}`, "info");
      currentRevision = resp.revision;
      document.getElementById("revision").innerText = currentRevision;
      // Update insert position for next char
      document.getElementById("insert-pos").value = pos + 1;
    })
    .receive("error", (err) => {
      log(`❌ Error: ${JSON.stringify(err)}`, "error");
    });
  }

  function sendDelete() {
    if (!channel) { log("❌ Not connected!", "error"); return; }
    const pos = parseInt(document.getElementById("delete-pos").value);

    channel.push("op", {
      revision: currentRevision,
      op: { type: "delete", pos: pos }
    })
    .receive("ok", (resp) => {
      log(`✅ Deleted at ${pos} → Rev: ${resp.revision}`, "info");
      currentRevision = resp.revision;
      document.getElementById("revision").innerText = currentRevision;
    })
    .receive("error", (err) => {
      log(`❌ Error: ${JSON.stringify(err)}`, "error");
    });
  }
</script>

</body>
</html>
